{% extends "base.html" %}

{% block title %}Tags · {{ config.title }}{% endblock title %}

{% block content %}
<div class="section-header">
  <h1 class="feed-label">Tags</h1>
</div>
<div class="posts-list">
  {% for term in terms %}
  <div class="post-item">
    <div class="post-date">&nbsp;</div>
    <div class="post-info">
      <div class="post-title"><a href="{{ term.permalink }}">#{{ term.name }}</a></div>
      <div class="post-tags">{{ term.pages | length }} post{% if term.pages | length != 1 %}s{% endif %}</div>
    </div>
  </div>
  {% endfor %}
</div>
{% endblock content %}
