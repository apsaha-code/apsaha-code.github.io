{% extends "base.html" %}

{% block title %}#{{ term.name }} · {{ config.title }}{% endblock title %}

{% block content %}
<div class="section-header">
  <h1 class="feed-label">#{{ term.name }}</h1>
</div>
<div class="posts-list">
  {% for page in term.pages %}
  <div class="post-item">
    <div class="post-date">{{ page.date | date(format="%b %Y") }}</div>
    <div class="post-info">
      <div class="post-title"><a href="{{ page.permalink }}">{{ page.title }}</a></div>
    </div>
  </div>
  {% endfor %}
</div>
{% endblock content %}
